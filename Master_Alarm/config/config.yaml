# =============================================================================
# SLT Lift Master Alarm System — Configuration
# =============================================================================
# This file contains all configurable parameters for the Master Alarm system.
# The InfluxDB API token is loaded from the INFLUXDB_TOKEN environment variable
# for security — do NOT put the token in this file.
# =============================================================================

# --- InfluxDB Connection ---
influxdb:
  url: "http://124.43.179.232:8086"
  org: "SLT"
  bucket: "Lift_Alarm_Status"
  measurement: "master_alarm"
  field: "alarm"
  # Token is loaded from environment variable INFLUXDB_TOKEN

# --- GPIO Pin Configuration ---
gpio:
  buzzer_1_pin: 17          # BCM GPIO17 → Physical Pin 11 → Relay 1 → Buzzer 1
  buzzer_2_pin: 27          # BCM GPIO27 → Physical Pin 13 → Relay 2 → Buzzer 2
  active_high: true         # true  = GPIO HIGH activates relay (active-HIGH modules)
                            # false = GPIO LOW activates relay (active-LOW modules with optocoupler)

# --- Polling Configuration ---
polling:
  interval_seconds: 1       # How often to query InfluxDB (seconds)
  query_range: "-5m"        # Flux query time range — how far back to look for the latest data point

# --- Reconnection Strategy ---
reconnection:
  max_retries: 0            # 0 = infinite retries (never give up)
  retry_delay_seconds: 5    # Initial delay before first retry
  backoff_multiplier: 2     # Exponential backoff factor (5s → 10s → 20s → 40s → 60s)
  max_delay_seconds: 60     # Maximum delay between retries (cap)

# --- Logging Configuration ---
logging:
  level: "INFO"                                    # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "/var/log/slt-master-alarm/alarm.log"      # Log file path
  max_bytes: 10485760                              # Max log file size before rotation (10 MB)
  backup_count: 5                                  # Number of rotated log files to keep
